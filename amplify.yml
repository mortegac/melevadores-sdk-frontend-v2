version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
        - yarn --version
        - yarn install --frozen-lockfile
        - git config user.email "ci@melevadores.cl"
        - git config user.name "Amplify CI"
        - export GITHUB_TOKEN=$(aws secretsmanager get-secret-value --secret-id "amplify/melevadores-frontend/GITHUB_TOKEN" --query SecretString --output text --region us-east-2)
        - "git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/mortegac/melevadores-sdk-frontend-v2.git"
    build:
      commands:
        - yarn build
    postBuild:
      commands:
        - git add package.json
        - "git diff --cached --quiet || git commit -m 'chore: bump patch version [skip ci]'"
        - "git diff --cached --quiet || git push origin HEAD:main"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
